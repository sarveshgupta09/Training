<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Form Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }
    .form-container {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    .form-container h2 {
      text-align: center;
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .output-box {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #007BFF;
      border-radius: 6px;
      background: #e9f5ff;
      display: none;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Login Form</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="printData()">Submit</button>
    
    <div class="output-box" id="output"></div>
  </div>

  <script>
    function printData() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      const outputBox = document.getElementById("output");

      outputBox.style.display = "block";
      outputBox.innerHTML = `
      <strong>Username:</strong> ${user} <br>
       <strong>Password:</strong> ${pass}`;
    }
  </script>
</body>
</html>
